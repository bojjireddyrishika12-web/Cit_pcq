# TinyTapeout project configuration file
project:
  title:        "8x8 Serial-Parallel PQC Core"
  description:  "An 8-bit Parallel-In Serial-Processed Parallel-Out scaled Post-Quantum Cryptography logic engine."
  author:       "Bojjireddy Rishika"
  language:     "Verilog"
  clock_hz:     10000000
  top_module:   "tt_um_example"
  tiles:        "1x1"
  source_files:
    - "src/project.v"

pinout:
  ui:
    "0": "Parallel input bit 0"
    "1": "Parallel input bit 1"
    "2": "Parallel input bit 2"
    "3": "Parallel input bit 3"
    "4": "Parallel input bit 4"
    "5": "Parallel input bit 5"
    "6": "Parallel input bit 6"
    "7": "Parallel input bit 7"
  uo:
    "0": "Transformed ciphertext bit 0"
    "1": "Transformed ciphertext bit 1"
    "2": "Transformed ciphertext bit 2"
    "3": "Transformed ciphertext bit 3"
    "4": "Transformed ciphertext bit 4"
    "5": "Transformed ciphertext bit 5"
    "6": "Transformed ciphertext bit 6"
    "7": "Transformed ciphertext bit 7"
  uio:
    "0": "ready_flag (output)"
    "1": "done_flag (output)"
    "2": "Unused"
    "3": "Unused"
    "4": "Unused"
    "5": "Unused"
    "6": "Unused"
    "7": "Unused"

# Do not change!
yaml_version: 6

    - "parallel_ciphertext_out[3]"
    - "parallel_ciphertext_out[4]"
    - "parallel_ciphertext_out[5]"
    - "parallel_ciphertext_out[6]"
    - "parallel_ciphertext_out[7]"
  uio:
    - "ready"

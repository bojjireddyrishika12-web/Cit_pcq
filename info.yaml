# TinyTapeout project information
project:
  title:        "Parallel ECC Protective Core"
  description:  "An 8-bit parallel data error correcting engine for secure V2X channels."
  author:       "Bojjireddy Rishika"
  language:     "Verilog"
  clock_hz:     10000000

how_it_works: "Accepts a full 8-bit parallel data packet over ui_in, calculates verification parity constraints instantly, corrects single-bit errors, and drives the restored parallel data to uo_out."
how_to_test: "Apply an 8-bit parallel data state vector on ui_in, pulse the clock wire, and observe the error flagging alert status on uio_out[0]."

# Inputs
ui_in:
  - "parallel_data_in[0]"
  - "parallel_data_in[1]"
  - "parallel_data_in[2]"
  - "parallel_data_in[3]"
  - "parallel_data_in[4]"
  - "parallel_data_in[5]"
  - "parallel_data_in[6]"
  - "parallel_data_in[7]"

# Outputs
uo_out:
  - "parallel_corrected_out[0]"
  - "parallel_corrected_out[1]"
  - "parallel_corrected_out[2]"
  - "parallel_corrected_out[3]"
  - "parallel_corrected_out[4]"
  - "parallel_corrected_out[5]"
  - "parallel_corrected_out[6]"
  - "parallel_corrected_out[7]"

# Bidirectional pins
uio:
  - "error_detected"
  - "ready"
  - "unused"
  - "unused"
  - "unused"
  - "unused"
  - "unused"
  - "unused"

# Do not change!
yaml_version: 6
